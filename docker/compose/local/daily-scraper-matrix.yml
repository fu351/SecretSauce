name: daily-scraper-local-matrix

x-daily-scraper-base: &daily-scraper-base
  build:
    context: ../../..
    dockerfile: backend/docker/Dockerfile.daily-scraper
  env_file:
    - ../../../.env.local
    - ./daily-scraper.shared.env
  depends_on:
    ollama-gemma-init:
      condition: service_completed_successfully
  environment: &daily-scraper-env
    STORE_STATE: "CA"
    STORE_CITIES_CSV: "San Francisco,Oakland,Berkeley"
    STORE_LIMIT: "10"
    INGREDIENT_LIMIT: "0"
    STORE_CONCURRENCY: "10"
    SCRAPER_BATCH_CONCURRENCY: "10"
    SCRAPER_BATCH_SIZE: "50"

services:
  ollama-gemma:
    image: ollama/ollama
    ports:
      - "11435:11434"
    volumes:
      - ollama-gemma-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 10s

  ollama-gemma-init:
    image: ollama/ollama
    depends_on:
      ollama-gemma:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama-gemma:11434
    entrypoint: ["/bin/sh", "-lc", "ollama pull gemma3:4b"]
    volumes:
      - ollama-gemma-data:/root/.ollama

  daily-scraper-target:
    <<: *daily-scraper-base
    environment:
      <<: *daily-scraper-env
      STORE_BRAND: "target"

  daily-scraper-kroger:
    <<: *daily-scraper-base
    environment:
      <<: *daily-scraper-env
      STORE_BRAND: "kroger"

  daily-scraper-aldi:
    <<: *daily-scraper-base
    environment:
      <<: *daily-scraper-env
      STORE_BRAND: "aldi"

  # Keep Trader Joe's behind Aldi so the two Jina-backed scrapers do not
  # compete locally when the whole matrix is started at once.
  daily-scraper-traderjoes:
    <<: *daily-scraper-base
    depends_on:
      daily-scraper-aldi:
        condition: service_completed_successfully
    environment:
      <<: *daily-scraper-env
      STORE_BRAND: "traderjoes"

  daily-scraper-andronicos:
    <<: *daily-scraper-base
    environment:
      <<: *daily-scraper-env
      STORE_BRAND: "andronicos"

  daily-scraper-meijer:
    <<: *daily-scraper-base
    environment:
      <<: *daily-scraper-env
      STORE_BRAND: "meijer"

  daily-scraper-99ranch:
    <<: *daily-scraper-base
    environment:
      <<: *daily-scraper-env
      STORE_BRAND: "99ranch"

volumes:
  ollama-gemma-data:
