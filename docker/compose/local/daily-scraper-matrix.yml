name: daily-scraper-local-matrix

x-daily-scraper-base: &daily-scraper-base
  build:
    context: ../../..
    dockerfile: backend/docker/Dockerfile.daily-scraper
  env_file:
    - ../../../.env.local
    - ./daily-scraper.shared.env
  environment: &daily-scraper-env
    STORE_STATE: "CA"
    STORE_CITIES_CSV: "San Francisco,Oakland,Berkeley"
    STORE_LIMIT: "10"
    INGREDIENT_LIMIT: "0"
    STORE_CONCURRENCY: "10"
    SCRAPER_BATCH_CONCURRENCY: "10"
    SCRAPER_BATCH_SIZE: "50"

services:
  daily-scraper-target:
    <<: *daily-scraper-base
    environment:
      <<: *daily-scraper-env
      STORE_BRAND: "target"

  daily-scraper-kroger:
    <<: *daily-scraper-base
    environment:
      <<: *daily-scraper-env
      STORE_BRAND: "kroger"

  daily-scraper-aldi:
    <<: *daily-scraper-base
    environment:
      <<: *daily-scraper-env
      STORE_BRAND: "aldi"

  # Keep Trader Joe's behind Aldi so the two Jina-backed scrapers do not
  # compete locally when the whole matrix is started at once.
  daily-scraper-traderjoes:
    <<: *daily-scraper-base
    depends_on:
      daily-scraper-aldi:
        condition: service_completed_successfully
    environment:
      <<: *daily-scraper-env
      STORE_BRAND: "traderjoes"

  daily-scraper-andronicos:
    <<: *daily-scraper-base
    environment:
      <<: *daily-scraper-env
      STORE_BRAND: "andronicos"

  daily-scraper-meijer:
    <<: *daily-scraper-base
    environment:
      <<: *daily-scraper-env
      STORE_BRAND: "meijer"

  daily-scraper-99ranch:
    <<: *daily-scraper-base
    environment:
      <<: *daily-scraper-env
      STORE_BRAND: "99ranch"
