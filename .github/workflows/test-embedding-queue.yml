name: Test Embedding Queue Resolution (Dry Run)

on:
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'Number of items to embed (max 10 in dry run)'
        required: false
        default: '10'
        type: choice
        options:
          - '5'
          - '10'
      source_type:
        description: 'Source type filter'
        required: false
        default: 'ingredient'
        type: choice
        options:
          - ingredient
          - recipe
          - any

jobs:
  test-embedding-queue:
    name: Test Embedding Queue (No DB Updates)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/scripts/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps --prefix scripts

      - name: Expose scripts dependencies to shared imports
        run: ln -sfn "$GITHUB_WORKSPACE/backend/scripts/node_modules" "$GITHUB_WORKSPACE/node_modules"

      - name: Test embedding queue resolution
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EMBEDDING_QUEUE_BATCH_LIMIT: ${{ inputs.batch_size }}
          EMBEDDING_WORKER_SOURCE_TYPE: ${{ inputs.source_type }}
          EMBEDDING_QUEUE_MAX_CYCLES: '1'
          EMBEDDING_DRY_RUN: 'true'
          NODE_ENV: production
        run: npm --prefix scripts run resolve-embedding-queue
