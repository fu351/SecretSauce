name: Relink Ingredient Mappings

on:
  schedule:
    # Weekly on Sunday at 3am UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      wipe_queue:
        description: 'Wipe ingredient_match_queue before relinking'
        required: false
        type: boolean
        default: false
      reset_all:
        description: 'Reset ALL mappings (ignore age filter)'
        required: false
        type: boolean
        default: false
      run_recipe_relink:
        description: 'Run recipe ingredient relink step'
        required: false
        type: boolean
        default: true
      run_product_relink:
        description: 'Run product mapping relink step'
        required: false
        type: boolean
        default: true
      run_initiating_workflow:
        description: 'Run full initiating workflow after relink'
        required: false
        type: boolean
        default: false
      run_drift_snapshot:
        description: 'Print canonical drift snapshot before/after queue resolve'
        required: false
        type: boolean
        default: true
      relink_batch_size:
        description: 'Batch size for relink RPC pagination'
        required: false
        type: string
        default: '500'
      relink_max_batches:
        description: 'Maximum relink batches per RPC'
        required: false
        type: string
        default: '200'

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  RELINK_BATCH_SIZE: ${{ github.event_name == 'workflow_dispatch' && inputs.relink_batch_size || '500' }}
  RELINK_MAX_BATCHES: ${{ github.event_name == 'workflow_dispatch' && inputs.relink_max_batches || '200' }}

jobs:
  relink:
    runs-on: ubuntu-latest
    steps:
      - name: Wipe Ingredient Match Queue
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.wipe_queue }}
        run: |
          echo "=== Wiping Ingredient Match Queue ==="

          # Get count before wipe
          BEFORE=$(curl -sI \
            "${SUPABASE_URL}/rest/v1/ingredient_match_queue?select=id" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Prefer: count=exact" \
            -H "Range: 0-0" \
            | grep -i '^content-range' \
            | sed -E 's/.*\/([0-9]+).*/\1/' || echo "0")

          echo "Rows before wipe: ${BEFORE}"

          # Delete all rows (id is UUID, so use not.is.null instead of numeric comparisons)
          curl -sf -X DELETE \
            "${SUPABASE_URL}/rest/v1/ingredient_match_queue?id=not.is.null" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Prefer: return=minimal"

          # Get count after wipe
          AFTER=$(curl -sI \
            "${SUPABASE_URL}/rest/v1/ingredient_match_queue?select=id" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Prefer: count=exact" \
            -H "Range: 0-0" \
            | grep -i '^content-range' \
            | sed -E 's/.*\/([0-9]+).*/\1/' || echo "0")

          echo "Rows after wipe: ${AFTER}"
          echo "Deleted: $((BEFORE - AFTER)) rows"

      - name: Relink Recipe Ingredients
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_recipe_relink }}
        run: |
          set -euo pipefail

          batch_size="${RELINK_BATCH_SIZE:-500}"
          max_batches="${RELINK_MAX_BATCHES:-200}"

          if ! [[ "${batch_size}" =~ ^[0-9]+$ ]] || [ "${batch_size}" -le 0 ]; then
            echo "Invalid RELINK_BATCH_SIZE=${batch_size}"
            exit 1
          fi
          if ! [[ "${max_batches}" =~ ^[0-9]+$ ]] || [ "${max_batches}" -le 0 ]; then
            echo "Invalid RELINK_MAX_BATCHES=${max_batches}"
            exit 1
          fi

          echo "=== Relinking Recipe Ingredients ==="
          echo "Batch config: size=${batch_size}, max_batches=${max_batches}"

          min_batch_size=25
          batch=1
          offset=0
          total_processed=0
          total_changed=0
          total_queued=0
          allow_batch_args=true
          previous_batch_signature=""

          while [ "${batch}" -le "${max_batches}" ]; do
            if [ "${allow_batch_args}" = "true" ]; then
              BODY=$(jq -cn --argjson p_limit "${batch_size}" --argjson p_offset "${offset}" \
                '{p_limit: $p_limit, p_offset: $p_offset}')
            else
              BODY='{}'
            fi

            RESPONSE_FILE="$(mktemp)"
            HTTP_STATUS=$(curl -sS -o "${RESPONSE_FILE}" -w "%{http_code}" -X POST \
              "${SUPABASE_URL}/rest/v1/rpc/fn_relink_recipe_ingredients" \
              -H "apikey: ${SUPABASE_SERVICE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
              -H "Content-Type: application/json" \
              -d "${BODY}")
            RESULT="$(cat "${RESPONSE_FILE}")"
            rm -f "${RESPONSE_FILE}"

            if [ "${HTTP_STATUS}" -lt 200 ] || [ "${HTTP_STATUS}" -ge 300 ]; then
              if [ "${allow_batch_args}" = "true" ] && \
                 echo "${RESULT}" | grep -Eqi "PGRST202|Could not find the function" && \
                 echo "${RESULT}" | grep -qi "fn_relink_recipe_ingredients"; then
                echo "Batch args unsupported for fn_relink_recipe_ingredients; falling back to single non-batched call."
                allow_batch_args=false
                batch=1
                offset=0
                total_processed=0
                total_changed=0
                total_queued=0
                continue
              fi

              if [ "${allow_batch_args}" = "true" ] && \
                 echo "${RESULT}" | grep -qi '"code":"57014"' && \
                 echo "${RESULT}" | grep -qi 'statement timeout'; then
                if [ "${batch_size}" -gt "${min_batch_size}" ]; then
                  next_batch_size=$((batch_size / 2))
                  if [ "${next_batch_size}" -lt "${min_batch_size}" ]; then
                    next_batch_size="${min_batch_size}"
                  fi
                  echo "Recipe relink timed out with size=${batch_size}; retrying with size=${next_batch_size}."
                  batch_size="${next_batch_size}"
                  continue
                fi
              fi

              echo "Recipe relink RPC failed (HTTP ${HTTP_STATUS})."
              echo "Response body:"
              echo "${RESULT}"
              exit 1
            fi

            BATCH_PROCESSED=$(echo "$RESULT" | jq -r '
              def norm: if type == "string" then (try fromjson catch .) else . end;
              (norm) as $n |
              if ($n | type) == "array" then ($n | length)
              elif ($n | type) == "object" then
                if ($n | has("rows")) and (($n.rows | type) == "array") then ($n.rows | length)
                elif ($n | has("total")) then ($n.total | tonumber? // 0)
                elif ($n | has("count")) then ($n.count | tonumber? // 0)
                elif ($n | has("processed_count")) then ($n.processed_count | tonumber? // 0)
                elif ($n | has("changed_count")) then ($n.changed_count | tonumber? // 0)
                elif ($n | has("relinked")) then ($n.relinked | tonumber? // 0)
                elif ($n | has("updated")) then ($n.updated | tonumber? // 0)
                else 0 end
              else 0 end
            ')
            BATCH_CHANGED=$(echo "$RESULT" | jq -r '
              def norm: if type == "string" then (try fromjson catch .) else . end;
              (norm) as $n
              | if ($n | type) == "array" then
                  [$n[] | select((type == "object") and ((.changed // false) == true))] | length
                elif ($n | type) == "object" then
                  if ($n | has("changed_count")) then ($n.changed_count | tonumber? // 0)
                  elif ($n | has("changed")) then (if ($n.changed == true or $n.changed == 1) then 1 else 0 end)
                  elif ($n | has("relinked")) then ($n.relinked | tonumber? // 0)
                  elif ($n | has("updated")) then ($n.updated | tonumber? // 0)
                  elif ($n | has("rows")) and (($n.rows | type) == "array") then
                    [$n.rows[] | select((type == "object") and ((.changed // false) == true))] | length
                  else 0 end
                else 0 end
            ')
            BATCH_QUEUED=$(echo "$RESULT" | jq -r '
              def norm: if type == "string" then (try fromjson catch .) else . end;
              (norm) as $n
              | if ($n | type) == "array" then
                  [$n[] | select((type == "object") and ((.ri_match_strategy // "") == "unmatched"))] | length
                elif ($n | type) == "object" then
                  if ($n | has("queued_count")) then ($n.queued_count | tonumber? // 0)
                  elif ($n | has("rows")) and (($n.rows | type) == "array") then
                    [$n.rows[] | select((type == "object") and ((.ri_match_strategy // "") == "unmatched"))] | length
                  else 0 end
                else 0 end
            ')

            total_processed=$((total_processed + BATCH_PROCESSED))
            total_changed=$((total_changed + BATCH_CHANGED))
            total_queued=$((total_queued + BATCH_QUEUED))

            echo "Recipe batch ${batch}: processed=${BATCH_PROCESSED}, relinked=${BATCH_CHANGED}, queued=${BATCH_QUEUED}"

            if [ "${allow_batch_args}" != "true" ]; then
              break
            fi

            if [ "${BATCH_PROCESSED}" -eq 0 ] || [ "${BATCH_PROCESSED}" -lt "${batch_size}" ]; then
              break
            fi

            current_batch_signature=$(echo "$RESULT" | jq -r '
              def norm: if type == "string" then (try fromjson catch .) else . end;
              (norm) as $n
              | if ($n | type) == "array" then $n
                elif ($n | type) == "object" and ($n | has("rows")) and (($n.rows | type) == "array") then $n.rows
                else [] end
              | map(.id // .recipe_ingredient_id // .row_id // empty)
              | map(tostring)
              | join(",")
            ')

            if [ -n "${current_batch_signature}" ] && [ "${current_batch_signature}" = "${previous_batch_signature}" ]; then
              echo "Recipe relink repeated the same head batch without shrinking the candidate set; aborting to avoid looping forever."
              exit 1
            fi

            previous_batch_signature="${current_batch_signature}"
            offset=$((offset + BATCH_PROCESSED))
            batch=$((batch + 1))
          done

          if [ "${batch}" -gt "${max_batches}" ]; then
            echo "Reached RELINK_MAX_BATCHES=${max_batches}; stopping early."
          fi

          echo "Total processed: ${total_processed} | Relinked: ${total_changed} | Queued for LLM: ${total_queued}"

      - name: Relink Product Mappings
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_product_relink }}
        run: |
          set -euo pipefail

          batch_size="${RELINK_BATCH_SIZE:-500}"
          max_batches="${RELINK_MAX_BATCHES:-200}"

          if ! [[ "${batch_size}" =~ ^[0-9]+$ ]] || [ "${batch_size}" -le 0 ]; then
            echo "Invalid RELINK_BATCH_SIZE=${batch_size}"
            exit 1
          fi
          if ! [[ "${max_batches}" =~ ^[0-9]+$ ]] || [ "${max_batches}" -le 0 ]; then
            echo "Invalid RELINK_MAX_BATCHES=${max_batches}"
            exit 1
          fi

          if [ "${{ inputs.reset_all }}" = "true" ]; then
            BASE_BODY='{"p_reset_all": true}'
          else
            BASE_BODY='{"p_older_than": "1 month"}'
          fi

          echo "=== Relinking Product Mappings ==="
          echo "Batch config: size=${batch_size}, max_batches=${max_batches}"

          min_batch_size=25
          batch=1
          total_processed=0
          total_changed=0
          allow_batch_args=true
          previous_batch_signature=""

          while [ "${batch}" -le "${max_batches}" ]; do
            if [ "${allow_batch_args}" = "true" ]; then
              BODY=$(echo "${BASE_BODY}" | jq -c --argjson p_limit "${batch_size}" --argjson p_offset 0 \
                '. + {p_limit: $p_limit, p_offset: $p_offset}')
            else
              BODY="${BASE_BODY}"
            fi

            RESPONSE_FILE="$(mktemp)"
            HTTP_STATUS=$(curl -sS -o "${RESPONSE_FILE}" -w "%{http_code}" -X POST \
              "${SUPABASE_URL}/rest/v1/rpc/fn_relink_product_mappings" \
              -H "apikey: ${SUPABASE_SERVICE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
              -H "Content-Type: application/json" \
              -d "${BODY}")
            RESULT="$(cat "${RESPONSE_FILE}")"
            rm -f "${RESPONSE_FILE}"

            if [ "${HTTP_STATUS}" -lt 200 ] || [ "${HTTP_STATUS}" -ge 300 ]; then
              if [ "${allow_batch_args}" = "true" ] && \
                 echo "${RESULT}" | grep -Eqi "PGRST202|Could not find the function" && \
                 echo "${RESULT}" | grep -qi "fn_relink_product_mappings"; then
                echo "Batch args unsupported for fn_relink_product_mappings; falling back to single non-batched call."
                allow_batch_args=false
                batch=1
                total_processed=0
                total_changed=0
                continue
              fi

              if [ "${allow_batch_args}" = "true" ] && \
                 echo "${RESULT}" | grep -qi '"code":"57014"' && \
                 echo "${RESULT}" | grep -qi 'statement timeout'; then
                if [ "${batch_size}" -gt "${min_batch_size}" ]; then
                  next_batch_size=$((batch_size / 2))
                  if [ "${next_batch_size}" -lt "${min_batch_size}" ]; then
                    next_batch_size="${min_batch_size}"
                  fi

                  echo "Product relink head batch timed out with size=${batch_size}; retrying with size=${next_batch_size}."
                  batch_size="${next_batch_size}"
                  continue
                fi
              fi

              echo "Product relink RPC failed (HTTP ${HTTP_STATUS})."
              echo "Response body:"
              echo "${RESULT}"

              if echo "${RESULT}" | grep -qi "fn_relink_product_mappings" && \
                 echo "${RESULT}" | grep -Eqi "PGRST202|Could not find the function"; then
                echo "Skipping product relink because fn_relink_product_mappings is not available in this environment."
                exit 0
              fi

              exit 1
            fi

            BATCH_PROCESSED=$(echo "$RESULT" | jq -r '
              def norm: if type == "string" then (try fromjson catch .) else . end;
              (norm) as $n |
              if ($n | type) == "array" then ($n | length)
              elif ($n | type) == "object" then
                if ($n | has("rows")) and (($n.rows | type) == "array") then ($n.rows | length)
                elif ($n | has("total")) then ($n.total | tonumber? // 0)
                elif ($n | has("count")) then ($n.count | tonumber? // 0)
                elif ($n | has("processed_count")) then ($n.processed_count | tonumber? // 0)
                elif ($n | has("changed_count")) then ($n.changed_count | tonumber? // 0)
                elif ($n | has("relinked")) then ($n.relinked | tonumber? // 0)
                elif ($n | has("updated")) then ($n.updated | tonumber? // 0)
                else 0 end
              else 0 end
            ')
            BATCH_CHANGED=$(echo "$RESULT" | jq -r '
              def norm: if type == "string" then (try fromjson catch .) else . end;
              (norm) as $n
              | if ($n | type) == "array" then
                  [$n[] | select((type == "object") and ((.changed // false) == true))] | length
                elif ($n | type) == "object" then
                  if ($n | has("changed_count")) then ($n.changed_count | tonumber? // 0)
                  elif ($n | has("changed")) then (if ($n.changed == true or $n.changed == 1) then 1 else 0 end)
                  elif ($n | has("relinked")) then ($n.relinked | tonumber? // 0)
                  elif ($n | has("updated")) then ($n.updated | tonumber? // 0)
                  elif ($n | has("rows")) and (($n.rows | type) == "array") then
                    [$n.rows[] | select((type == "object") and ((.changed // false) == true))] | length
                  else 0 end
                else 0 end
            ')

            total_processed=$((total_processed + BATCH_PROCESSED))
            total_changed=$((total_changed + BATCH_CHANGED))

            echo "Product batch ${batch}: processed=${BATCH_PROCESSED}, relinked=${BATCH_CHANGED}"

            if [ "${allow_batch_args}" != "true" ]; then
              break
            fi

            if [ "${BATCH_PROCESSED}" -eq 0 ] || [ "${BATCH_PROCESSED}" -lt "${batch_size}" ]; then
              break
            fi

            current_batch_signature=$(echo "$RESULT" | jq -r '
              def norm: if type == "string" then (try fromjson catch .) else . end;
              (norm) as $n
              | if ($n | type) == "array" then $n
                elif ($n | type) == "object" and ($n | has("rows")) and (($n.rows | type) == "array") then $n.rows
                else [] end
              | map(.id // .product_mapping_id // .row_id // empty)
              | map(tostring)
              | join(",")
            ')

            if [ -n "${current_batch_signature}" ] && [ "${current_batch_signature}" = "${previous_batch_signature}" ]; then
              echo "Product relink repeated the same head batch without shrinking the candidate set; aborting to avoid looping forever."
              exit 1
            fi

            previous_batch_signature="${current_batch_signature}"
            batch=$((batch + 1))
          done

          if [ "${batch}" -gt "${max_batches}" ]; then
            echo "Reached RELINK_MAX_BATCHES=${max_batches}; stopping early."
          fi

          echo "Total processed: ${total_processed} | Relinked: ${total_changed}"

      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/scripts/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix backend/scripts

      - name: Expose scripts dependencies to shared imports
        run: ln -sfn "$GITHUB_WORKSPACE/backend/scripts/node_modules" "$GITHUB_WORKSPACE/node_modules"

      - name: Drift Snapshot (Before)
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_drift_snapshot }}
        run: |
          echo "=== Canonical Drift Snapshot (specific_to_generic, last 30 days) ==="
          cutoff="$(date -u -d '30 days ago' +%Y-%m-%d)"
          curl -sf \
            "${SUPABASE_URL}/rest/v1/canonical_double_check_daily_stats?select=event_date,source_canonical,target_canonical,decision,direction,event_count,reason&direction=eq.specific_to_generic&event_date=gte.${cutoff}&order=event_count.desc&limit=25" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            | jq -r '.[] | "\(.event_date) | \(.decision) | \(.event_count)x | \(.source_canonical) -> \(.target_canonical) | reason=\(.reason)"'

      - name: "Resolve Ingredient Match Queue (Pass 1: Warm Drift Learner)"
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.SUPABASE_SERVICE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SUPABASE_SERVICE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: 'gpt-4o-mini'
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: 'gemini-3-flash-preview'
          QUEUE_STANDARDIZER_CONTEXT: 'dynamic'
          QUEUE_SOURCE: 'any'
          QUEUE_REVIEW_MODE: 'ingredient'
          NODE_ENV: production
        run: |
          # First cycle generates fresh drift telemetry from current queue content.
          QUEUE_RESOLVER_NAME="relink-map-run-b1" QUEUE_MAX_CYCLES="1" npm --prefix backend/scripts run ingredient-match-queue-pipeline

      - name: "Resolve Ingredient Match Queue (Pass 2: Drift-Informed)"
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.SUPABASE_SERVICE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SUPABASE_SERVICE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: 'gpt-4o-mini'
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: 'gemini-3-flash-preview'
          QUEUE_STANDARDIZER_CONTEXT: 'dynamic'
          QUEUE_SOURCE: 'any'
          QUEUE_REVIEW_MODE: 'ingredient'
          QUEUE_RESOLVER_NAME: 'relink-map-run-b2'
          NODE_ENV: production
        run: npm --prefix backend/scripts run ingredient-match-queue-pipeline

      - name: Queue Summary
        run: |
          echo "=== Queue Status ==="

          # Optimized: Use count queries with minimal data fetch
          get_count() {
            local filter="$1"
            curl -sI \
              "${SUPABASE_URL}/rest/v1/ingredient_match_queue?select=id&${filter}" \
              -H "apikey: ${SUPABASE_SERVICE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
              -H "Prefer: count=exact" \
              -H "Range: 0-0" \
              | grep -i '^content-range' \
              | sed -E 's/.*\/([0-9]+).*/\1/' || echo "0"
          }

          echo "Status breakdown by source:"
          for source in scraper recipe; do
            for status in pending processing resolved failed; do
              count=$(get_count "source=eq.${source}&status=eq.${status}")
              [ "$count" != "0" ] && echo "  ${source}/${status}: ${count}"
            done
          done

          # Total pending count
          pending_total=$(get_count "status=eq.pending")
          echo "Total pending rows: ${pending_total}"

      - name: Drift Snapshot (After)
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_drift_snapshot }}
        run: |
          echo "=== Canonical Drift Snapshot After Queue Resolve (specific_to_generic, last 30 days) ==="
          cutoff="$(date -u -d '30 days ago' +%Y-%m-%d)"
          curl -sf \
            "${SUPABASE_URL}/rest/v1/canonical_double_check_daily_stats?select=event_date,source_canonical,target_canonical,decision,direction,event_count,reason&direction=eq.specific_to_generic&event_date=gte.${cutoff}&order=event_count.desc&limit=25" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            | jq -r '.[] | "\(.event_date) | \(.decision) | \(.event_count)x | \(.source_canonical) -> \(.target_canonical) | reason=\(.reason)"'

  initiating-bootstrap:
    name: Full Bootstrap (Initiating Workflow)
    needs: relink
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_initiating_workflow }}
    uses: ./.github/workflows/initiating-workflow.yml
    secrets: inherit
    with:
      queue_resolver_name: "relink-initiating"
      scraper_cities_csv: "San Francisco,Oakland,Berkeley"
      scraper_state: "CA"
      ingredient_limit: "0"
      store_limit: "0"
