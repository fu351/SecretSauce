# Nightly Canonical Pipeline
#
# Runs the full canonical pipeline: probation embedding, queue embedding (recipe + product),
# vector double-check discovery, and canonical consolidation.
# Runs after the ingredient queue so newly created canonicals and queue rows from that
# run are available for processing.

name: Nightly Canonical Pipeline

on:
  workflow_call:
    inputs:
      embedding_dry_run:
        description: "Dry run mode"
        required: false
        type: string
        default: "false"
  workflow_dispatch:
    inputs:
      embedding_dry_run:
        description: "Dry run mode"
        required: false
        type: choice
        options:
          - "false"
          - "true"
        default: "false"

jobs:
  load-config:
    name: Load Pipeline Defaults
    runs-on: ubuntu-latest
    outputs:
      probation_batch_limit: ${{ steps.defaults.outputs.probation_batch_limit }}
      queue_batch_limit: ${{ steps.defaults.outputs.queue_batch_limit }}
      embedding_model: ${{ steps.defaults.outputs.embedding_model }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read pipeline defaults
        id: defaults
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          cfg = json.loads(Path(".github/workflows/config/pipeline-defaults.json").read_text(encoding="utf-8"))
          section = cfg["nightly_canonical_pipeline"]
          output_path = Path(os.environ["GITHUB_OUTPUT"])
          keys = (
              "probation_batch_limit",
              "queue_batch_limit",
              "embedding_model",
          )

          with output_path.open("a", encoding="utf-8") as fh:
              for key in keys:
                  fh.write(f"{key}={section[key]}\n")
          PY

  canonical-pipeline:
    name: Run Canonical Pipeline
    needs: load-config
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      OLLAMA_BASE_URL: http://127.0.0.1:11434
      PIPELINE_DRY_RUN: ${{ inputs.embedding_dry_run }}
      PIPELINE_STOP_ON_STAGE_ERROR: "true"
      PIPELINE_EMBEDDING_MODEL: ${{ needs['load-config'].outputs.embedding_model }}
      PIPELINE_PROBATION_BATCH_LIMIT: ${{ needs['load-config'].outputs.probation_batch_limit }}
      PIPELINE_QUEUE_BATCH_LIMIT: ${{ needs['load-config'].outputs.queue_batch_limit }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/scripts/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix backend/scripts

      - name: Expose scripts dependencies to shared imports
        run: ln -sfn "$GITHUB_WORKSPACE/backend/scripts/node_modules" "$GITHUB_WORKSPACE/node_modules"

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama
        run: |
          set -euo pipefail
          nohup ollama serve > /tmp/ollama.log 2>&1 &

          for attempt in $(seq 1 30); do
            if curl -fsS "${OLLAMA_BASE_URL}/api/tags" >/dev/null; then
              echo "Ollama is ready."
              exit 0
            fi
            sleep 1
          done

          echo "Ollama failed to become ready."
          cat /tmp/ollama.log || true
          exit 1

      - name: Pull embedding model
        run: ollama pull "${PIPELINE_EMBEDDING_MODEL}"

      - name: Run canonical pipeline
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SUPABASE_SERVICE_KEY }}
          NODE_ENV: production
        run: npm --prefix backend/scripts run canonical-pipeline
