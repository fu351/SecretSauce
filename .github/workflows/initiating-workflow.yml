name: Initiating Workflow

on:
  workflow_call:
    inputs:
      use_mock_recipe_generator:
        description: "Run optional generated mock recipes in addition to hardcoded seed recipes"
        required: false
        type: boolean
        default: false
      use_recipe_generator:
        description: "Generate mock recipes before queueing (false = use preseeded recipes)"
        required: false
        type: boolean
        default: true
      seed_author_id:
        description: "Author profile UUID for mock recipe seeding (blank = auto-resolve)"
        required: false
        type: string
        default: ""
      stores_csv:
        description: "Comma-separated stores (blank = all)"
        required: false
        type: string
        default: ""
      scraper_state:
        description: "2-letter state override (blank = default)"
        required: false
        type: string
        default: ""
      scraper_cities_csv:
        description: "Comma-separated Title Case city override (blank = default)"
        required: false
        type: string
        default: ""
      scraper_zip_min:
        description: "Minimum ZIP filter (blank = no lower bound)"
        required: false
        type: string
        default: ""
      scraper_zip_max:
        description: "Maximum ZIP filter (blank = no upper bound)"
        required: false
        type: string
        default: ""
      ingredient_limit:
        description: "Limit ingredients scraped (0 = all)"
        required: false
        type: string
        default: "0"
      store_limit:
        description: "Limit store rows queried (0 = all)"
        required: false
        type: string
        default: "0"
      pre_queue_context:
        description: "Queue context before scraping"
        required: false
        type: string
        default: "recipe"
      post_queue_context:
        description: "Queue context after scraping"
        required: false
        type: string
        default: "pantry"
      queue_resolver_name:
        description: "Queue resolver base name"
        required: false
        type: string
        default: "initiating-openai"
      queue_dry_run:
        description: "Dry run queue stage"
        required: false
        type: string
        default: "false"
  workflow_dispatch:
    inputs:
      use_mock_recipe_generator:
        description: "Run optional generated mock recipes in addition to hardcoded seed recipes"
        required: false
        type: boolean
        default: false
      use_recipe_generator:
        description: "Generate mock recipes before queueing (unchecked = use preseeded recipes)"
        required: false
        type: boolean
        default: true
      seed_author_id:
        description: "Author profile UUID for mock recipe seeding (blank = auto-resolve)"
        required: false
        type: string
        default: ""
      stores_csv:
        description: "Comma-separated stores (blank = all)"
        required: false
        type: string
        default: ""
      scraper_state:
        description: "2-letter state override (blank = default)"
        required: false
        type: string
        default: ""
      scraper_cities_csv:
        description: "Comma-separated Title Case city override (blank = default)"
        required: false
        type: string
        default: ""
      scraper_zip_min:
        description: "Minimum ZIP filter (blank = no lower bound)"
        required: false
        type: string
        default: ""
      scraper_zip_max:
        description: "Maximum ZIP filter (blank = no upper bound)"
        required: false
        type: string
        default: ""
      ingredient_limit:
        description: "Limit ingredients scraped (0 = all)"
        required: false
        type: string
        default: "0"
      store_limit:
        description: "Limit store rows queried (0 = all)"
        required: false
        type: string
        default: "0"
      pre_queue_context:
        description: "Queue context before scraping"
        required: false
        type: choice
        options:
          - recipe
          - pantry
        default: recipe
      post_queue_context:
        description: "Queue context after scraping"
        required: false
        type: choice
        options:
          - pantry
          - recipe
        default: pantry
      queue_resolver_name:
        description: "Queue resolver base name"
        required: false
        type: string
        default: "initiating-openai"
      queue_dry_run:
        description: "Dry run queue stage"
        required: false
        type: choice
        options:
          - "false"
          - "true"
        default: "false"

jobs:
  load-config:
    name: Load Pipeline Defaults
    runs-on: ubuntu-latest
    outputs:
      scraper_state: ${{ steps.defaults.outputs.scraper_state }}
      scraper_cities_csv: ${{ steps.defaults.outputs.scraper_cities_csv }}
      queue_resolver_name: ${{ steps.defaults.outputs.queue_resolver_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read pipeline defaults
        id: defaults
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          cfg = json.loads(Path(".github/workflows/config/pipeline-defaults.json").read_text(encoding="utf-8"))
          section = cfg["initiating_workflow"]
          output_path = Path(os.environ["GITHUB_OUTPUT"])
          keys = ("scraper_state", "scraper_cities_csv", "queue_resolver_name")

          with output_path.open("a", encoding="utf-8") as fh:
              for key in keys:
                  fh.write(f"{key}={section[key]}\n")
          PY

  seed-mock-recipes:
    name: Seed Mock Recipes
    if: ${{ inputs.use_recipe_generator }}
    runs-on: ubuntu-latest
    outputs:
      seed_author_id: ${{ steps.resolve-author.outputs.author_id }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/scripts/package-lock.json

      - name: Install dependencies
        timeout-minutes: 15
        run: npm ci --prefix backend/scripts

      - name: Expose scripts dependencies to shared imports
        run: ln -sfn "$GITHUB_WORKSPACE/backend/scripts/node_modules" "$GITHUB_WORKSPACE/node_modules"

      - name: Resolve seed author id
        id: resolve-author
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          INPUT_SEED_AUTHOR_ID: ${{ inputs.seed_author_id || '' }}
          SECRET_SEED_AUTHOR_ID: ${{ secrets.SUPABASE_SEED_AUTHOR_ID }}
        run: |
          set -euo pipefail

          AUTHOR_ID="${INPUT_SEED_AUTHOR_ID// /}"

          if [ -z "$AUTHOR_ID" ] && [ -n "${SECRET_SEED_AUTHOR_ID:-}" ]; then
            AUTHOR_ID="${SECRET_SEED_AUTHOR_ID// /}"
            echo "Using SUPABASE_SEED_AUTHOR_ID from secrets"
          fi

          if [ -z "$AUTHOR_ID" ]; then
            echo "No author id provided. Querying earliest profile id..."
            RESPONSE=$(curl -sfS \
              "${SUPABASE_URL}/rest/v1/profiles?select=id&order=created_at.asc&limit=1" \
              -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}")

            AUTHOR_ID=$(echo "$RESPONSE" | jq -r '.[0].id // empty')
          fi

          if [ -z "$AUTHOR_ID" ]; then
            echo "❌ Could not resolve a seed author id. Provide seed_author_id input or SUPABASE_SEED_AUTHOR_ID secret."
            exit 1
          fi

          echo "author_id=$AUTHOR_ID" >> "$GITHUB_OUTPUT"
          echo "✅ Using seed author id: $AUTHOR_ID"

      - name: Seed mock recipes
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_SEED_AUTHOR_ID: ${{ steps.resolve-author.outputs.author_id }}
          INCLUDE_QUEUE_DRIFT_STRESS_RECIPES: "false"
        run: |
          set -euo pipefail
          ./backend/scripts/node_modules/.bin/tsx backend/scripts/temp/seed-mock-recipes.ts

      - name: Seed generated mock recipes (optional)
        if: ${{ inputs.use_mock_recipe_generator }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_SEED_AUTHOR_ID: ${{ steps.resolve-author.outputs.author_id }}
        run: |
          set -euo pipefail
          if [ -f "backend/scripts/seed-generated-mock-recipes.ts" ]; then
            ./backend/scripts/node_modules/.bin/tsx backend/scripts/seed-generated-mock-recipes.ts
          else
            echo "No generated mock recipe script found at backend/scripts/seed-generated-mock-recipes.ts; skipping optional generator."
          fi

  pre-queue:
    name: Pre-Scrape Ingredient Queue
    needs: [load-config, seed-mock-recipes]
    if: ${{ always() && (needs['seed-mock-recipes'].result == 'success' || needs['seed-mock-recipes'].result == 'skipped') }}
    uses: ./.github/workflows/nightly-ingredient-queue.yml
    secrets: inherit
    with:
      queue_context: ${{ inputs.pre_queue_context || 'recipe' }}
      queue_source: recipe
      queue_resolver_name: ${{ format('{0}-pre', inputs.queue_resolver_name || needs['load-config'].outputs.queue_resolver_name) }}
      queue_dry_run: ${{ inputs.queue_dry_run || 'false' }}

  scraper:
    name: Daily Scraper Matrix
    needs: pre-queue
    if: ${{ always() && needs['pre-queue'].result == 'success' }}
    uses: ./.github/workflows/daily-scraper-matrix.yml
    secrets: inherit
    with:
      stores_csv: ${{ inputs.stores_csv || '' }}
      scraper_state: ${{ inputs.scraper_state || needs['load-config'].outputs.scraper_state }}
      scraper_cities_csv: ${{ inputs.scraper_cities_csv || needs['load-config'].outputs.scraper_cities_csv }}
      scraper_zip_min: ${{ inputs.scraper_zip_min || '' }}
      scraper_zip_max: ${{ inputs.scraper_zip_max || '' }}
      ingredient_limit: ${{ inputs.ingredient_limit || '0' }}
      store_limit: ${{ inputs.store_limit || '0' }}

  post-queue:
    name: Post-Scrape Ingredient Queue
    needs: scraper
    if: ${{ always() }}
    uses: ./.github/workflows/nightly-ingredient-queue.yml
    secrets: inherit
    with:
      queue_context: ${{ inputs.post_queue_context || 'pantry' }}
      queue_source: scraper
      queue_resolver_name: ${{ format('{0}-post', inputs.queue_resolver_name || needs['load-config'].outputs.queue_resolver_name) }}
      queue_dry_run: ${{ inputs.queue_dry_run || 'false' }}

  update-unit-estimates:
    name: Update Unit Weight Estimates
    needs: post-queue
    if: ${{ always() }}
    uses: ./.github/workflows/update-unit-weight-estimates.yml
    secrets: inherit
