name: Weekly Notification Digest

on:
  schedule:
    - cron: "0 15 * * 1"
  workflow_dispatch:

jobs:
  send-digest:
    name: Send Weekly Notification Digest
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      NOTIFICATIONS_FROM_EMAIL: ${{ secrets.NOTIFICATIONS_FROM_EMAIL }}
      NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/scripts/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix backend/scripts

      - name: Link shared node_modules
        run: ln -sfn "$GITHUB_WORKSPACE/backend/scripts/node_modules" "$GITHUB_WORKSPACE/node_modules"

      - name: Run weekly notification digest
        run: npm --prefix backend/scripts run notification-digest-pipeline
