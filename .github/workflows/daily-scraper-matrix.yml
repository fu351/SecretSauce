name: Daily Scraper Matrix
# ---------------------------------------------------------------------------
# Resource Budget Strategy
# ---------------------------------------------------------------------------
# This workflow uses three layers of throttling to prevent burst 429s when
# many matrix jobs fire simultaneously against shared external APIs:
#
# 1. Concurrency groups (per-job level)
#    Jobs that share the same underlying rate-limit domain (e.g. Jina AI for
#    traderjoes/aldi/wholefoods) are placed in the same concurrency group so
#    only one runs at a time within a workflow run.  Non-Jina stores each get
#    their own group and can run in parallel up to max-parallel.
#
# 2. Per-store stagger delay (start_delay_s matrix field)
#    Even within stores that are NOT serialised by a concurrency group, a
#    small startup sleep is injected so they don't all hit their respective
#    APIs in the same second.  Jina-backed stores use longer offsets (0/30/60s)
#    because they share a single API key quota.
#
# 3. Conservative per-job env vars
#    STORE_CONCURRENCY, SCRAPER_BATCH_CONCURRENCY, and INGREDIENT_DELAY_MS are
#    set at the workflow level (from pipeline-defaults.json) and are overridden
#    to tighter values for Jina-backed stores specifically to limit burst
#    parallelism inside each job.  These complement — never replace — the
#    per-scraper rate limiters inside daily-scraper.js.
# ---------------------------------------------------------------------------

on:
  workflow_call:
    inputs:
      stores_csv:
        description: "Comma-separated stores (blank = all)"
        required: false
        type: string
        default: ""
      scraper_state:
        description: "2-letter state override (blank = default)"
        required: false
        type: string
        default: ""
      scraper_cities_csv:
        description: "Comma-separated Title Case city override (blank = default)"
        required: false
        type: string
        default: ""
      scraper_zip_min:
        description: "Minimum ZIP filter (blank = no lower bound)"
        required: false
        type: string
        default: ""
      scraper_zip_max:
        description: "Maximum ZIP filter (blank = no upper bound)"
        required: false
        type: string
        default: ""
      ingredient_limit:
        description: "Limit ingredients scraped (0 = all)"
        required: false
        type: string
        default: "0"
      store_limit:
        description: "Limit store rows queried (0 = all)"
        required: false
        type: string
        default: "0"
  workflow_dispatch:
    inputs:
      stores_csv:
        description: "Comma-separated stores (blank = all)"
        required: false
        type: string
        default: ""
      scraper_state:
        description: "2-letter state override (blank = default)"
        required: false
        type: string
        default: ""
      scraper_cities_csv:
        description: "Comma-separated Title Case city override (blank = default)"
        required: false
        type: string
        default: ""
      scraper_zip_min:
        description: "Minimum ZIP filter (blank = no lower bound)"
        required: false
        type: string
        default: ""
      scraper_zip_max:
        description: "Maximum ZIP filter (blank = no upper bound)"
        required: false
        type: string
        default: ""
      ingredient_limit:
        description: "Limit ingredients scraped (0 = all)"
        required: false
        type: string
        default: "0"
      store_limit:
        description: "Limit store rows queried (0 = all)"
        required: false
        type: string
        default: "0"

concurrency:
  # Dedupes overlapping runs for the same ref+store selection while allowing queued execution.
  group: daily-scraper-matrix-${{ github.ref }}-${{ inputs.stores_csv || 'all' }}
  cancel-in-progress: false

jobs:
  load-config:
    name: Load Pipeline Defaults
    runs-on: ubuntu-latest
    outputs:
      scraper_state: ${{ steps.defaults.outputs.scraper_state }}
      scraper_cities_csv: ${{ steps.defaults.outputs.scraper_cities_csv }}
      store_concurrency: ${{ steps.defaults.outputs.store_concurrency }}
      ingredient_delay_ms: ${{ steps.defaults.outputs.ingredient_delay_ms }}
      insert_batch_size: ${{ steps.defaults.outputs.insert_batch_size }}
      request_timeout_ms: ${{ steps.defaults.outputs.request_timeout_ms }}
      scraper_timeout_minutes: ${{ steps.defaults.outputs.scraper_timeout_minutes }}
      scraper_batch_size: ${{ steps.defaults.outputs.scraper_batch_size }}
      scraper_batch_concurrency: ${{ steps.defaults.outputs.scraper_batch_concurrency }}
      traderjoes_batch_size: ${{ steps.defaults.outputs.traderjoes_batch_size }}
      traderjoes_batch_concurrency: ${{ steps.defaults.outputs.traderjoes_batch_concurrency }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read pipeline defaults
        id: defaults
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          cfg = json.loads(Path(".github/workflows/config/pipeline-defaults.json").read_text(encoding="utf-8"))
          section = cfg["daily_scraper_matrix"]
          output_path = Path(os.environ["GITHUB_OUTPUT"])
          keys = (
              "scraper_state",
              "scraper_cities_csv",
              "store_concurrency",
              "ingredient_delay_ms",
              "insert_batch_size",
              "request_timeout_ms",
              "scraper_timeout_minutes",
              "scraper_batch_size",
              "scraper_batch_concurrency",
              "traderjoes_batch_size",
              "traderjoes_batch_concurrency",
          )

          with output_path.open("a", encoding="utf-8") as fh:
              for key in keys:
                  fh.write(f"{key}={section[key]}\n")
          PY

  prepare-matrix:
    name: Prepare Store Matrix
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      store_json: ${{ steps.build.outputs.store_json }}

    steps:
      - name: Build store matrix
        id: build
        env:
          STORES_CSV: ${{ inputs.stores_csv }}
        run: |
          set -euo pipefail

          # Temporarily disable Safeway from nightly matrix runs.
          # Whole Foods temporarily disabled.
          # Walmart temporarily disabled - hitting CAPTCHA challenges despite rate limiting, retry logic, and User-Agent rotation.
          default_stores=(target kroger aldi traderjoes andronicos meijer 99ranch)
          allowed_stores=(aldi kroger safeway meijer target traderjoes 99ranch walmart andronicos wholefoods)

          if [ -z "${STORES_CSV// }" ]; then
            selected=("${default_stores[@]}")
          else
            normalized=$(echo "$STORES_CSV" | tr '[:upper:]' '[:lower:]' | tr ';' ',' | tr -d ' ')
            IFS=',' read -r -a requested <<< "$normalized"
            selected=()
            declare -A seen=()
            duplicate_count=0

            for candidate in "${requested[@]}"; do
              [ -z "$candidate" ] && continue
              case "$candidate" in
                aldi|kroger|safeway|meijer|target|traderjoes|99ranch|walmart|andronicos|wholefoods)
                  if [ -z "${seen[$candidate]+x}" ]; then
                    selected+=("$candidate")
                    seen[$candidate]=1
                  else
                    duplicate_count=$((duplicate_count + 1))
                  fi
                  ;;
                *)
                  echo "❌ Unsupported store in stores_csv: $candidate"
                  echo "Allowed stores: ${allowed_stores[*]}"
                  exit 1
                  ;;
              esac
            done

            if [ "${#selected[@]}" -eq 0 ]; then
              echo "❌ No valid stores found in stores_csv"
              exit 1
            fi

            if [ "$duplicate_count" -gt 0 ]; then
              echo "⚠️ Deduped $duplicate_count duplicate store entries from stores_csv"
            fi
          fi

          # Assign per-store metadata:
          #   store_brand  — the underlying API domain used for concurrency grouping.
          #                  Jina-backed stores (traderjoes, aldi, wholefoods) share
          #                  the same API key and are grouped under "jina".
          #                  All others get their own brand name so they can run in
          #                  parallel without hitting a shared rate limit.
          #   start_delay_s — stagger offset so jobs don't hammer APIs simultaneously.
          #                  Jina stores are spaced 30 s apart; non-Jina stores start
          #                  immediately (offset 0) because they hit independent APIs.
          declare -A brand_map=(
            [traderjoes]="jina"
            [aldi]="jina"
            [wholefoods]="jina"
            [walmart]="walmart"
            [kroger]="kroger"
            [safeway]="safeway"
            [andronicos]="andronicos"
            [meijer]="meijer"
            [target]="target"
            [99ranch]="99ranch"
          )

          jina_delay=0
          json="["
          for i in "${!selected[@]}"; do
            store="${selected[$i]}"
            brand="${brand_map[$store]:-$store}"
            if [ "$brand" = "jina" ]; then
              delay=$jina_delay
              jina_delay=$((jina_delay + 30))
            else
              delay=0
            fi
            [ "$i" -gt 0 ] && json+=","
            json+="{\"store\":\"${store}\",\"store_brand\":\"${brand}\",\"start_delay_s\":${delay}}"
          done
          json+="]"

          echo "store_json=$json" >> "$GITHUB_OUTPUT"
          echo "Using stores: $json"

  scrape-stores:
    name: Scrape ${{ matrix.store }}
    needs: [load-config, prepare-matrix]
    if: ${{ vars.DAILY_SCRAPER_FORCE_STOP != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    concurrency:
      # Serialise jobs that share the same underlying API rate-limit domain.
      # Jina-backed stores (traderjoes, aldi, wholefoods) all get store_brand="jina"
      # so at most one of them runs at a time per workflow run.
      # All other stores have a unique store_brand and run in parallel (subject to
      # max-parallel) without contending on a shared rate limit.
      group: daily-scraper-${{ matrix.store_brand || 'all' }}-${{ github.run_id }}
      cancel-in-progress: false

    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include: ${{ fromJson(needs.prepare-matrix.outputs.store_json) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Stagger job start
        # Spread API bursts by sleeping for the per-store offset defined in the
        # matrix.  Jina-backed stores are staggered 30 s apart; all others are 0.
        run: |
          DELAY_S="${{ matrix.start_delay_s || 0 }}"
          if [ "$DELAY_S" -gt 0 ]; then
            echo "Staggering job start by ${DELAY_S}s (store_brand: ${{ matrix.store_brand }})"
            sleep "$DELAY_S"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package-lock.json

      - name: Install dependencies
        timeout-minutes: 15
        run: npm ci --prefix scripts

      - name: Expose scripts dependencies to shared imports
        run: ln -sfn "$GITHUB_WORKSPACE/scripts/node_modules" "$GITHUB_WORKSPACE/node_modules"

      - name: Scrape ${{ matrix.store }}
        timeout-minutes: 170
        env:
          STORE_BRAND: ${{ matrix.store }}
          STORE_STATE: ${{ inputs.scraper_state || needs['load-config'].outputs.scraper_state }}
          STORE_CITIES_CSV: ${{ inputs.scraper_cities_csv || needs['load-config'].outputs.scraper_cities_csv }}
          STORE_ZIP_MIN: ${{ inputs.scraper_zip_min }}
          STORE_ZIP_MAX: ${{ inputs.scraper_zip_max }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
          INGREDIENT_LIMIT: ${{ inputs.ingredient_limit }}
          STORE_LIMIT: ${{ inputs.store_limit }}
          # Orchestration-level resource budget:
          # Jina-backed stores (store_brand=jina) use tighter concurrency limits to
          # avoid burst 429s on the shared Jina API key.  Non-Jina stores use the
          # pipeline-defaults values which are already tuned for their own APIs.
          STORE_CONCURRENCY: ${{ matrix.store_brand == 'jina' && '10' || needs['load-config'].outputs.store_concurrency }}
          SCRAPER_BATCH_CONCURRENCY: ${{ matrix.store_brand == 'jina' && '3' || needs['load-config'].outputs.scraper_batch_concurrency }}
          INGREDIENT_DELAY_MS: ${{ matrix.store_brand == 'jina' && '500' || needs['load-config'].outputs.ingredient_delay_ms }}
          INSERT_BATCH_SIZE: ${{ needs['load-config'].outputs.insert_batch_size }}
          SCRAPER_TIMEOUT_MS: ${{ needs['load-config'].outputs.request_timeout_ms }}
          SCRAPER_TIMEOUT_MINUTES: ${{ needs['load-config'].outputs.scraper_timeout_minutes }}
          SCRAPER_BATCH_SIZE: ${{ needs['load-config'].outputs.scraper_batch_size }}
          TRADERJOES_BATCH_SIZE: ${{ needs['load-config'].outputs.traderjoes_batch_size }}
          TRADERJOES_BATCH_CONCURRENCY: ${{ needs['load-config'].outputs.traderjoes_batch_concurrency }}
          NODE_ENV: production
        run: |
          set -euo pipefail

          # Clamp configurable timeouts to keep runs safe from unbounded values.
          if ! [[ "${SCRAPER_TIMEOUT_MS:-}" =~ ^[0-9]+$ ]]; then SCRAPER_TIMEOUT_MS=20000; fi
          if [ "$SCRAPER_TIMEOUT_MS" -lt 5000 ]; then SCRAPER_TIMEOUT_MS=5000; fi
          if [ "$SCRAPER_TIMEOUT_MS" -gt 60000 ]; then SCRAPER_TIMEOUT_MS=60000; fi

          if ! [[ "${SCRAPER_TIMEOUT_MINUTES:-}" =~ ^[0-9]+$ ]]; then SCRAPER_TIMEOUT_MINUTES=90; fi
          if [ "$SCRAPER_TIMEOUT_MINUTES" -lt 10 ]; then SCRAPER_TIMEOUT_MINUTES=10; fi
          if [ "$SCRAPER_TIMEOUT_MINUTES" -gt 165 ]; then SCRAPER_TIMEOUT_MINUTES=165; fi

          if ! [[ "${SCRAPER_BATCH_SIZE:-}" =~ ^[0-9]+$ ]]; then SCRAPER_BATCH_SIZE=20; fi
          if [ "$SCRAPER_BATCH_SIZE" -lt 1 ]; then SCRAPER_BATCH_SIZE=1; fi
          if [ "$SCRAPER_BATCH_SIZE" -gt 200 ]; then SCRAPER_BATCH_SIZE=200; fi

          if ! [[ "${SCRAPER_BATCH_CONCURRENCY:-}" =~ ^[0-9]+$ ]]; then SCRAPER_BATCH_CONCURRENCY=4; fi
          if [ "$SCRAPER_BATCH_CONCURRENCY" -lt 1 ]; then SCRAPER_BATCH_CONCURRENCY=1; fi
          if [ "$SCRAPER_BATCH_CONCURRENCY" -gt 20 ]; then SCRAPER_BATCH_CONCURRENCY=20; fi

          if ! [[ "${TRADERJOES_BATCH_SIZE:-}" =~ ^[0-9]+$ ]]; then TRADERJOES_BATCH_SIZE=20; fi
          if [ "$TRADERJOES_BATCH_SIZE" -lt 1 ]; then TRADERJOES_BATCH_SIZE=1; fi
          if [ "$TRADERJOES_BATCH_SIZE" -gt 200 ]; then TRADERJOES_BATCH_SIZE=200; fi

          if ! [[ "${TRADERJOES_BATCH_CONCURRENCY:-}" =~ ^[0-9]+$ ]]; then TRADERJOES_BATCH_CONCURRENCY=2; fi
          if [ "$TRADERJOES_BATCH_CONCURRENCY" -lt 1 ]; then TRADERJOES_BATCH_CONCURRENCY=1; fi
          if [ "$TRADERJOES_BATCH_CONCURRENCY" -gt 10 ]; then TRADERJOES_BATCH_CONCURRENCY=10; fi

          if [ -n "${STORE_STATE:-}" ]; then
            STORE_STATE=$(echo "$STORE_STATE" | tr '[:lower:]' '[:upper:]' | tr -d ' ')
            if ! [[ "$STORE_STATE" =~ ^[A-Z]{2}$ ]]; then
              echo "❌ STORE_STATE must be a 2-letter abbreviation (got: $STORE_STATE)"
              exit 1
            fi
            export STORE_STATE
          fi

          export SCRAPER_TIMEOUT_MS
          export SCRAPER_BATCH_SIZE
          export SCRAPER_BATCH_CONCURRENCY
          export TRADERJOES_BATCH_SIZE
          export TRADERJOES_BATCH_CONCURRENCY

          echo "🚀 Starting scraper for ${{ matrix.store }}"
          echo "   Request timeout (ms): $SCRAPER_TIMEOUT_MS"
          echo "   Job hard timeout (m): $SCRAPER_TIMEOUT_MINUTES"
          echo "   Default batch size: $SCRAPER_BATCH_SIZE"
          echo "   Default batch concurrency: $SCRAPER_BATCH_CONCURRENCY"
          echo "   Trader Joe's batch size: $TRADERJOES_BATCH_SIZE"
          echo "   Trader Joe's batch concurrency: $TRADERJOES_BATCH_CONCURRENCY"
          echo "   State filter: ${STORE_STATE:-<none>}"
          echo "   City filter: ${STORE_CITIES_CSV:-<none>}"
          echo "   ZIP min/max: ${STORE_ZIP_MIN:-<none>} / ${STORE_ZIP_MAX:-<none>}"

          set +e
          timeout --signal=SIGTERM --kill-after=90s "${SCRAPER_TIMEOUT_MINUTES}m" node scripts/daily-scraper.js
          status=$?
          set -e

          if [ "$status" -eq 124 ]; then
            echo "❌ Scraper timed out after ${SCRAPER_TIMEOUT_MINUTES} minutes for ${{ matrix.store }}"
          fi

          exit "$status"
