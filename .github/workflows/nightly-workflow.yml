name: Nightly Workflow

on:
  schedule:
    # Runs daily at midnight Pacific during PST (08:00 UTC).
    # Note: GitHub schedule is UTC-only, so during PDT this will run at 1:00 AM Pacific.
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      purge_mode:
        description: "execute or dry-run"
        required: false
        type: choice
        options:
          - execute
          - dry-run
        default: execute
      skip_purge:
        description: "Skip purge step (manual runs only)"
        required: false
        type: boolean
        default: false
      run_mode:
        description: "Execution control mode"
        required: false
        type: choice
        options:
          - normal
          - stop_after_purge
          - stop_after_scraper
          - stop_after_update
          - stop_after_queue
          - emergency_stop
        default: normal
      stores_csv:
        description: "Comma-separated stores (blank = all)"
        required: false
        type: string
        default: ""
      scraper_state:
        description: "2-letter state override (blank = default)"
        required: false
        type: string
        default: ""
      scraper_cities_csv:
        description: "Comma-separated Title Case city override (blank = default)"
        required: false
        type: string
        default: ""
      scraper_zip_min:
        description: "Minimum ZIP filter (blank = no lower bound)"
        required: false
        type: string
        default: ""
      scraper_zip_max:
        description: "Maximum ZIP filter (blank = no upper bound)"
        required: false
        type: string
        default: ""
      ingredient_limit:
        description: "Limit ingredients scraped (0 = all)"
        required: false
        type: string
        default: "0"
      store_limit:
        description: "Limit store rows queried (0 = all)"
        required: false
        type: string
        default: "0"
      queue_context:
        description: "Queue context (dynamic|pantry|recipe)"
        required: false
        type: choice
        options:
          - dynamic
          - pantry
          - recipe
        default: dynamic
      queue_resolver_name:
        description: "Queue resolver run name"
        required: false
        type: string
        default: "nightly-openai"
      queue_dry_run:
        description: "Dry run queue stage"
        required: false
        type: choice
        options:
          - "false"
          - "true"
        default: "false"
      embedding_dry_run:
        description: "Dry run embedding queue stage"
        required: false
        type: choice
        options:
          - "false"
          - "true"
        default: "false"

jobs:
  load-config:
    name: Load Pipeline Defaults
    runs-on: ubuntu-latest
    outputs:
      scraper_state: ${{ steps.defaults.outputs.scraper_state }}
      scraper_cities_csv: ${{ steps.defaults.outputs.scraper_cities_csv }}
      queue_resolver_name: ${{ steps.defaults.outputs.queue_resolver_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read pipeline defaults
        id: defaults
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          cfg = json.loads(Path(".github/workflows/config/pipeline-defaults.json").read_text(encoding="utf-8"))
          section = cfg["nightly_workflow"]
          output_path = Path(os.environ["GITHUB_OUTPUT"])
          keys = ("scraper_state", "scraper_cities_csv", "queue_resolver_name")

          with output_path.open("a", encoding="utf-8") as fh:
              for key in keys:
                  fh.write(f"{key}={section[key]}\n")
          PY

  purge:
    name: Daily Purge
    if: ${{ (inputs.run_mode || 'normal') != 'emergency_stop' && (github.event_name != 'workflow_dispatch' || !inputs.skip_purge) }}
    uses: ./.github/workflows/daily-purge.yml
    secrets: inherit
    with:
      purge_mode: ${{ inputs.purge_mode || 'execute' }}

  scraper:
    name: Daily Scraper Matrix
    needs: [load-config, purge]
    if: ${{ always() && (needs.purge.result == 'success' || needs.purge.result == 'skipped') && !contains(fromJson('["emergency_stop","stop_after_purge"]'), inputs.run_mode || 'normal') }}
    uses: ./.github/workflows/daily-scraper-matrix.yml
    secrets: inherit
    with:
      stores_csv: ${{ inputs.stores_csv || '' }}
      scraper_state: ${{ inputs.scraper_state || needs['load-config'].outputs.scraper_state }}
      scraper_cities_csv: ${{ inputs.scraper_cities_csv || needs['load-config'].outputs.scraper_cities_csv }}
      scraper_zip_min: ${{ inputs.scraper_zip_min || '' }}
      scraper_zip_max: ${{ inputs.scraper_zip_max || '' }}
      ingredient_limit: ${{ inputs.ingredient_limit || '0' }}
      store_limit: ${{ inputs.store_limit || '0' }}

  update-unit-estimates:
    name: Update Unit Weight Estimates
    needs: scraper
    if: ${{ always() && needs.scraper.result == 'success' && !contains(fromJson('["emergency_stop","stop_after_purge","stop_after_scraper"]'), inputs.run_mode || 'normal') }}
    uses: ./.github/workflows/update-unit-weight-estimates.yml
    secrets: inherit

  queue:
    name: Nightly Ingredient Queue
    needs: [load-config, update-unit-estimates]
    if: ${{ always() && !contains(fromJson('["emergency_stop","stop_after_purge","stop_after_scraper","stop_after_update"]'), inputs.run_mode || 'normal') }}
    uses: ./.github/workflows/nightly-ingredient-queue.yml
    secrets: inherit
    with:
      queue_context: ${{ inputs.queue_context || 'dynamic' }}
      queue_resolver_name: ${{ inputs.queue_resolver_name || needs['load-config'].outputs.queue_resolver_name }}
      queue_dry_run: ${{ inputs.queue_dry_run || 'false' }}

  embedding-queue:
    name: Nightly Embedding Queue
    needs: [queue]
    if: ${{ always() && (needs.queue.result == 'success' || needs.queue.result == 'skipped') && !contains(fromJson('["emergency_stop","stop_after_purge","stop_after_scraper","stop_after_update","stop_after_queue"]'), inputs.run_mode || 'normal') }}
    uses: ./.github/workflows/nightly-embedding-queue.yml
    secrets: inherit
    with:
      embedding_dry_run: ${{ inputs.embedding_dry_run || 'false' }}
      embedding_source_type: "ingredient"
