name: Product Mapping Confidence Audit

on:
  schedule:
    # Weekly on Monday at 4am UTC
    - cron: '0 4 * * 1'
  workflow_dispatch:
    inputs:
      low_threshold:
        description: 'Ingredient confidence below this is flagged as low (0–1)'
        required: false
        type: string
        default: '0.75'
      critical_threshold:
        description: 'Ingredient confidence below this is flagged as critical (0–1)'
        required: false
        type: string
        default: '0.50'
      fail_on_critical:
        description: 'Fail the workflow if any critical-confidence mappings exist'
        required: false
        type: boolean
        default: false

jobs:
  audit:
    name: Audit Product Mapping Confidence Levels
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      LOW_THRESHOLD: ${{ inputs.low_threshold || '0.75' }}
      CRITICAL_THRESHOLD: ${{ inputs.critical_threshold || '0.50' }}
      FAIL_ON_CRITICAL: ${{ inputs.fail_on_critical || 'false' }}

    steps:
      - name: Validate inputs
        run: |
          for val in "${LOW_THRESHOLD}" "${CRITICAL_THRESHOLD}"; do
            if ! echo "${val}" | grep -Eq '^0(\.[0-9]+)?$|^1(\.0+)?$'; then
              echo "Invalid threshold value: ${val} (expected 0–1)"
              exit 1
            fi
          done

      - name: Overall counts
        run: |
          echo "=== Product Mapping Counts ==="

          get_count() {
            local filter="$1"
            curl -sI \
              "${SUPABASE_URL}/rest/v1/product_mappings?select=id${filter:+&${filter}}" \
              -H "apikey: ${SUPABASE_SERVICE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
              -H "Prefer: count=exact" \
              -H "Range: 0-0" \
              | grep -i '^content-range' \
              | sed -E 's/.*\/([0-9]+).*/\1/' \
              || echo "0"
          }

          total=$(get_count "")
          nullconf=$(get_count "ingredient_confidence=is.null")
          has_conf=$(get_count "ingredient_confidence=not.is.null")
          manual=$(get_count "manual_override=is.true")

          echo "Total mappings:                    ${total}"
          echo "  With ingredient_confidence set:  ${has_conf}"
          echo "  Without ingredient_confidence:   ${nullconf}"
          echo "  Manual override (any conf):      ${manual}"

      - name: Confidence distribution (non-manual)
        run: |
          echo ""
          echo "=== Ingredient Confidence Distribution (non-manual rows) ==="

          get_band() {
            local filter="$1"
            curl -sI \
              "${SUPABASE_URL}/rest/v1/product_mappings?select=id&ingredient_confidence=not.is.null&manual_override=not.is.true${filter:+&${filter}}" \
              -H "apikey: ${SUPABASE_SERVICE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
              -H "Prefer: count=exact" \
              -H "Range: 0-0" \
              | grep -i '^content-range' \
              | sed -E 's/.*\/([0-9]+).*/\1/' \
              || echo "0"
          }

          critical=$(get_band "ingredient_confidence=lt.${CRITICAL_THRESHOLD}")
          low=$(get_band "ingredient_confidence=gte.${CRITICAL_THRESHOLD}&ingredient_confidence=lt.${LOW_THRESHOLD}")
          medium=$(get_band "ingredient_confidence=gte.${LOW_THRESHOLD}&ingredient_confidence=lt.0.85")
          high=$(get_band "ingredient_confidence=gte.0.85&ingredient_confidence=lt.0.93")
          very_high=$(get_band "ingredient_confidence=gte.0.93")

          echo "  Critical  (< ${CRITICAL_THRESHOLD}):          ${critical}"
          echo "  Low       (${CRITICAL_THRESHOLD} – ${LOW_THRESHOLD}):      ${low}"
          echo "  Medium    (${LOW_THRESHOLD} – 0.85):   ${medium}"
          echo "  High      (0.85 – 0.93):        ${high}"
          echo "  Very high (≥ 0.93):             ${very_high}"

          # Export for use in later steps
          echo "CRITICAL_COUNT=${critical}" >> "$GITHUB_ENV"
          echo "LOW_COUNT=${low}" >> "$GITHUB_ENV"

      - name: Unit & quantity confidence distribution (non-manual)
        run: |
          echo ""
          echo "=== Unit & Quantity Confidence Distribution (non-manual rows) ==="

          get_count() {
            local filter="$1"
            curl -sI \
              "${SUPABASE_URL}/rest/v1/product_mappings?select=id&manual_override=not.is.true${filter:+&${filter}}" \
              -H "apikey: ${SUPABASE_SERVICE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
              -H "Prefer: count=exact" \
              -H "Range: 0-0" \
              | grep -i '^content-range' \
              | sed -E 's/.*\/([0-9]+).*/\1/' \
              || echo "0"
          }

          unit_null=$(get_count "unit_confidence=is.null")
          unit_low=$(get_count "unit_confidence=not.is.null&unit_confidence=lt.${LOW_THRESHOLD}")
          unit_ok=$(get_count "unit_confidence=gte.${LOW_THRESHOLD}")

          qty_null=$(get_count "quantity_confidence=is.null")
          qty_low=$(get_count "quantity_confidence=not.is.null&quantity_confidence=lt.${LOW_THRESHOLD}")
          qty_ok=$(get_count "quantity_confidence=gte.${LOW_THRESHOLD}")

          echo "  Unit confidence:"
          echo "    Null:                  ${unit_null}"
          echo "    Low (< ${LOW_THRESHOLD}):      ${unit_low}"
          echo "    OK  (≥ ${LOW_THRESHOLD}):      ${unit_ok}"
          echo "  Quantity confidence:"
          echo "    Null:                  ${qty_null}"
          echo "    Low (< ${LOW_THRESHOLD}):      ${qty_low}"
          echo "    OK  (≥ ${LOW_THRESHOLD}):      ${qty_ok}"

      - name: Sample critical-confidence mappings
        if: ${{ env.CRITICAL_COUNT != '0' }}
        run: |
          echo ""
          echo "=== Critical Ingredient Confidence Mappings (bottom 25, non-manual) ==="
          echo "These have ingredient_confidence < ${CRITICAL_THRESHOLD} and no manual override."
          echo ""

          curl -sf \
            "${SUPABASE_URL}/rest/v1/product_mappings?select=raw_product_name,ingredient_confidence,unit_confidence,quantity_confidence,store_brand,standardized_ingredient_id&ingredient_confidence=not.is.null&ingredient_confidence=lt.${CRITICAL_THRESHOLD}&manual_override=not.is.true&order=ingredient_confidence.asc&limit=25" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            | jq -r '
              ["confidence", "store", "raw_product_name", "ingredient_id"],
              ["----------", "-----", "----------------", "-----------"],
              (.[] | [
                (.ingredient_confidence // "null" | tostring),
                (.store_brand // "?"),
                (.raw_product_name // "(none)"),
                (.standardized_ingredient_id // "(unmapped)")
              ])
              | @tsv
            '

      - name: Sample low-confidence mappings
        if: ${{ env.LOW_COUNT != '0' }}
        run: |
          echo ""
          echo "=== Low Ingredient Confidence Mappings (bottom 25 in [${CRITICAL_THRESHOLD}, ${LOW_THRESHOLD}), non-manual) ==="
          echo ""

          curl -sf \
            "${SUPABASE_URL}/rest/v1/product_mappings?select=raw_product_name,ingredient_confidence,unit_confidence,store_brand,standardized_ingredient_id&ingredient_confidence=gte.${CRITICAL_THRESHOLD}&ingredient_confidence=lt.${LOW_THRESHOLD}&manual_override=not.is.true&order=ingredient_confidence.asc&limit=25" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            | jq -r '
              ["confidence", "store", "raw_product_name", "ingredient_id"],
              ["----------", "-----", "----------------", "-----------"],
              (.[] | [
                (.ingredient_confidence // "null" | tostring),
                (.store_brand // "?"),
                (.raw_product_name // "(none)"),
                (.standardized_ingredient_id // "(unmapped)")
              ])
              | @tsv
            '

      - name: Mappings with no ingredient_confidence (not yet resolved)
        run: |
          echo ""
          echo "=== Unresolved Mappings (null ingredient_confidence, non-manual) ==="

          count=$(
            curl -sI \
              "${SUPABASE_URL}/rest/v1/product_mappings?select=id&ingredient_confidence=is.null&manual_override=not.is.true" \
              -H "apikey: ${SUPABASE_SERVICE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
              -H "Prefer: count=exact" \
              -H "Range: 0-0" \
              | grep -i '^content-range' \
              | sed -E 's/.*\/([0-9]+).*/\1/' \
              || echo "0"
          )
          echo "Unresolved (no ingredient_confidence): ${count}"

          if [ "${count}" -gt 0 ]; then
            echo ""
            echo "Sample (up to 10):"
            curl -sf \
              "${SUPABASE_URL}/rest/v1/product_mappings?select=raw_product_name,store_brand,last_seen_at&ingredient_confidence=is.null&manual_override=not.is.true&order=last_seen_at.desc&limit=10" \
              -H "apikey: ${SUPABASE_SERVICE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
              | jq -r '.[] | "\(.last_seen_at // "?") | \(.store_brand // "?") | \(.raw_product_name // "(none)")"'
          fi

      - name: Per-store breakdown
        run: |
          echo ""
          echo "=== Low/Critical Confidence Breakdown by Store ==="
          echo "(ingredient_confidence < ${LOW_THRESHOLD}, non-manual)"

          curl -sf \
            "${SUPABASE_URL}/rest/v1/product_mappings?select=store_brand,ingredient_confidence&ingredient_confidence=not.is.null&ingredient_confidence=lt.${LOW_THRESHOLD}&manual_override=not.is.true&limit=2000" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            | jq -r '
              group_by(.store_brand)
              | map({
                  store: .[0].store_brand,
                  count: length,
                  avg_conf: (map(.ingredient_confidence) | add / length | . * 1000 | round / 1000)
                })
              | sort_by(-.count)
              | .[]
              | "\(.count) low-confidence | avg=\(.avg_conf) | \(.store)"
            '

      - name: Summary
        run: |
          echo ""
          echo "=== Audit Summary ==="
          echo "  Critical (< ${CRITICAL_THRESHOLD}): ${CRITICAL_COUNT}"
          echo "  Low      (${CRITICAL_THRESHOLD}–${LOW_THRESHOLD}): ${LOW_COUNT}"

          if [ "${CRITICAL_COUNT}" -gt 0 ]; then
            echo ""
            echo "⚠️  ${CRITICAL_COUNT} mapping(s) have critically low ingredient confidence."
            echo "   Consider running the relink-mappings workflow to re-resolve these."
          fi

          if [ "${LOW_COUNT}" -gt 0 ]; then
            echo ""
            echo "ℹ️  ${LOW_COUNT} mapping(s) have low-but-not-critical confidence."
          fi

          if [ "${CRITICAL_COUNT}" -eq 0 ] && [ "${LOW_COUNT}" -eq 0 ]; then
            echo "✅ No low-confidence mappings found."
          fi

      - name: Fail on critical
        if: ${{ env.FAIL_ON_CRITICAL == 'true' && env.CRITICAL_COUNT != '0' }}
        run: |
          echo "❌ Failing workflow: ${CRITICAL_COUNT} critical-confidence mapping(s) found (fail_on_critical=true)."
          exit 1
