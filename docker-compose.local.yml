services:
  # Local Ollama server — stores pulled models in a named volume so they
  # survive container restarts.
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 10s

  # One-shot init container: pulls nomic-embed-text before the worker starts.
  # Skipped automatically on subsequent runs if the model is already cached.
  ollama-init:
    image: ollama/ollama
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["ollama", "pull", "nomic-embed-text"]
    volumes:
      - ollama-data:/root/.ollama

  # Embedding queue worker — drains pending rows using the local Ollama model.
  # Requires Supabase credentials in .env.local (or set them in environment:).
  embedding-worker:
    build:
      context: .
      dockerfile: backend/docker/Dockerfile.embedding-worker
    depends_on:
      ollama-init:
        condition: service_completed_successfully
    env_file:
      - .env.local
    environment:
      - EMBEDDING_PROVIDER=ollama
      - OLLAMA_BASE_URL=http://ollama:11434
      - EMBEDDING_OPENAI_MODEL=nomic-embed-text

  # Monthly vector double-check candidate discovery — scans for high-similarity
  # with vector hints, semantic dedup, calibration, token IDF, learned
  # sensitivity, and canonical double-check.
  #
  # This worker still uses OpenAI for live vector lookup today; Ollama powers
  # the local embedding pipeline that populates ingredient_embeddings.
  # Default to dry-run locally so the service is safe to start while tuning.
  ingredient-remap-worker:
    build:
      context: .
      dockerfile: backend/docker/Dockerfile.ingredient-remap-worker
    depends_on:
      ollama-init:
        condition: service_completed_successfully
    env_file:
      - .env.local
    environment:
      - DRY_RUN=true
      - QUEUE_BATCH_LIMIT=25
      - QUEUE_CHUNK_SIZE=10
      - QUEUE_CHUNK_CONCURRENCY=1
      - QUEUE_REVIEW_MODE=ingredient
      - QUEUE_SOURCE=scraper
      - QUEUE_ENABLE_UNIT_RESOLUTION=true
      - QUEUE_STANDARDIZER_CONTEXT=dynamic
      - EMBEDDING_OPENAI_MODEL=text-embedding-3-small

  # Monthly vector double-check candidate discovery - scans for high-similarity
  # ingredient pairs that haven't been reviewed yet and queues them for review.
  # Run after embeddings have been populated by embedding-worker.
  vector-double-check-worker:
    build:
      context: .
      dockerfile: backend/docker/Dockerfile.embedding-worker
    command: ["node_modules/.bin/tsx", "backend/orchestrators/vector-double-check-pipeline.ts"]
    env_file:
      - .env.local
    environment:
      - EMBEDDING_OPENAI_MODEL=nomic-embed-text
      - VECTOR_DC_DRY_RUN=false
      - VECTOR_DC_SIMILARITY_THRESHOLD=0.9

  # Canonical consolidation worker — merges duplicate/near-duplicate canonicals
  # identified by the vector double-check worker. Defaults to dry-run; set
  # CONSOLIDATION_DRY_RUN=false to apply merges after review data exists.
  canonical-consolidation-worker:
    build:
      context: .
      dockerfile: backend/docker/Dockerfile.embedding-worker
    depends_on:
      ollama-init:
        condition: service_completed_successfully
    command: ["node_modules/.bin/tsx", "backend/orchestrators/canonical-consolidation-pipeline.ts"]
    env_file:
      - .env.local
    environment:
      - CONSOLIDATION_DRY_RUN=false
      - CONSOLIDATION_MIN_SIMILARITY=0.92
      - CONSOLIDATION_MIN_EVENT_COUNT=1

  # Full canonical pipeline — runs probation-embedding → vector-discovery → consolidation
  # in sequence. Requires Ollama for the embedding stage. Defaults to dry-run=false
  # since this is the primary operational entry-point for the full pipeline.
  canonical-pipeline:
    build:
      context: .
      dockerfile: backend/docker/Dockerfile.embedding-worker
    depends_on:
      ollama-init:
        condition: service_completed_successfully
    command: ["node_modules/.bin/tsx", "backend/orchestrators/canonical-pipeline.ts"]
    env_file:
      - .env.local
    environment:
      - PIPELINE_DRY_RUN=false
      - PIPELINE_ENABLE_PROBATION_EMBEDDING=true
      - PIPELINE_ENABLE_VECTOR_DISCOVERY=true
      - PIPELINE_ENABLE_CONSOLIDATION=true
      - PIPELINE_STOP_ON_STAGE_ERROR=true
      - OLLAMA_BASE_URL=http://ollama:11434
      - PIPELINE_EMBEDDING_MODEL=nomic-embed-text
      - PIPELINE_VECTOR_EMBEDDING_MODEL=text-embedding-3-small

  # Vector-based product remapping — embeds raw_product_name via Ollama and
  # updates standardized_ingredient_id on all non-manual product_mappings rows
  # when a higher-confidence canonical match is found.
  # Requires embedding-worker to have already populated ingredient_embeddings.
  # Defaults to dry-run locally; set DRY_RUN=false to apply changes.
  product-remap-worker:
    build:
      context: .
      dockerfile: backend/docker/Dockerfile.product-remap-worker
    depends_on:
      ollama-init:
        condition: service_completed_successfully
    env_file:
      - .env.local
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - EMBEDDING_MODEL=nomic-embed-text
      - DRY_RUN=false
      - BATCH_SIZE=100
      - MIN_CONFIDENCE=0.7
      - MIN_NULL_CONFIDENCE=0.5

  # Local daily scraper smoke test - dry-run only, with small limits so we can
  # validate scraper orchestration without writing any database changes.
  # For a matrix-style local setup with one service per brand, use:
  # docker/compose/local/daily-scraper-matrix.yml
  daily-scraper-local:
    build:
      context: .
      dockerfile: backend/docker/Dockerfile.daily-scraper
    env_file:
      - .env.local
      - docker/compose/local/daily-scraper.shared.env
    environment:
      - STORE_LIMIT=10
      - INGREDIENT_LIMIT=0
      - STORE_CONCURRENCY=5
      - SCRAPER_BATCH_CONCURRENCY=5

volumes:
  ollama-data:
